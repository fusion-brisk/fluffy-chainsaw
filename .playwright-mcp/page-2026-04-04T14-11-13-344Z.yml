                        - paragraph [ref=e202]: '🍋 Пасхальный кекс с лимоном и маком Ингредиенты: Мука — 320 г Масло сливочное — 270 г Яйцо — 5 шт. Сахар — 300 г Крахмал — 80 г Разрыхлитель — 6 г Лимонный сок — 60 мл Цедра 1-2 лимонов Мак — 50 г Ванилин — по вкусу Соль — щепотка Мягкое сливочное масло смешать с сахаром, перемешать до объединения. Добавить лимонный сок, соль и цедру лимона. Взбить миксером до получения однородной массы. Добавлять по одному яйца, каждый раз взбивая, пока смесь не станет гладкой и глянцевой. В отдельной емкости смешать муку, крахмал, ванилин, разрыхлитель. Просеять мучную смесь в масляную. Добавить мак. Смешать лопаткой до получения гладкого теста. Тесто для лимонного кекса выложить в форму, предварительно смазать стенки и дно маслом, и присыпать мукой или манкой. Выпекать 40-50 минут на 180 градусах до румяного цвета. Готовность проверяйте шпажкой. Сохраните, чтобы не потерять 💚'
