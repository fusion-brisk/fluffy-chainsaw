openapi: 3.0.0
info:
  title: Contentify Cloud Relay
  version: 0.1.0
  description: |
    HTTPS proxy to the contentify-relay Cloud Function.
    All paths are forwarded to the function with httpMethod, path,
    queryStringParameters, headers, and body preserved.
paths:
  /{proxy+}:
    x-yc-apigateway-any-method:
      summary: Catch-all proxy to the relay function
      parameters:
        - name: proxy
          in: path
          required: true
          schema:
            type: string
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: d4ecpjmj74l9nagonk7u
        service_account_id: ajenv2ku5vup9hk163ot
        context:
          token: ''
