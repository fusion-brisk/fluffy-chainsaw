name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build -w packages/extension

      - name: Build extension CRX
        if: ${{ env.EXTENSION_PEM != '' }}
        env:
          EXTENSION_PEM: ${{ secrets.EXTENSION_PEM }}
        run: |
          echo "$EXTENSION_PEM" > packages/extension/extension.pem
          npx crx3 pack packages/extension -o contentify.crx -p packages/extension/extension.pem
          rm packages/extension/extension.pem
          ls -la contentify.crx

      - name: Build relay binary (arm64)
        run: |
          npm run build:pkg:arm64
          mv pkg-dist/contentify-relay pkg-dist/contentify-relay-host-arm64
          chmod +x pkg-dist/contentify-relay-host-arm64
          ls -la pkg-dist/
        working-directory: packages/relay

      - name: Build relay binary (x64)
        run: |
          npm run build:pkg:x64
          mv pkg-dist/contentify-relay pkg-dist/contentify-relay-host-x64
          chmod +x pkg-dist/contentify-relay-host-x64
        working-directory: packages/relay

      - name: Build macOS Installer zip
        if: ${{ env.EXTENSION_PEM != '' }}
        env:
          EXTENSION_PEM: ${{ secrets.EXTENSION_PEM }}
        run: |
          mkdir -p "tools/Contentify Installer.app/Contents/Resources"
          cp contentify.crx "tools/Contentify Installer.app/Contents/Resources/extension.crx"
          cd tools
          zip -r ../Contentify-Installer.zip "Contentify Installer.app"
          cd ..
          ls -la Contentify-Installer.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            contentify.crx
            Contentify-Installer.zip
            packages/relay/pkg-dist/contentify-relay-host-arm64
            packages/relay/pkg-dist/contentify-relay-host-x64
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update versions.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > versions.json << EOF
          {
            "relay": {
              "latest": "$VERSION",
              "minimum": "2.5.0",
              "downloadUrl": "https://github.com/fusion-brisk/fluffy-chainsaw/releases/latest/download/Contentify-Installer.zip"
            },
            "extension": {
              "latest": "$VERSION",
              "minimum": "1.4.0",
              "downloadUrl": "https://github.com/fusion-brisk/fluffy-chainsaw/releases/latest/download/contentify.crx"
            },
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          npx prettier --write versions.json

      - name: Commit versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore: update versions.json for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
