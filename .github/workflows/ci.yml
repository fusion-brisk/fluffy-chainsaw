name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck -w packages/plugin
      - run: npm run typecheck -w packages/relay
      - run: npm run lint -w packages/plugin
      - run: npm run format:check
      - run: npm run test -w packages/plugin
      - run: npm run build -w packages/plugin
      - run: npm run build -w packages/extension
      - run: npm run build -w packages/relay
